apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: demo-k8
  name: my-app-deploy
spec:
  replicas: 4
  selector:
    matchLabels:
      app: my-app-web
  template:
    metadata:
      labels:
        app: my-app-web
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80